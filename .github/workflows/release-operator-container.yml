name: Release Keycloak Operator container

on:
  workflow_dispatch:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
concurrency: keycloak-operator-container-release

env:
  JDK_VERSION: 11

jobs:
  build:
    if: github.repository == 'keycloak-poc/keycloak'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: ${{ env.JDK_VERSION }}
          cache: 'maven'

      - name: Build locally Keycloak artifacts to avoid depending on Maven
        run: |
          mvn -P operator -pl operator -am clean install -DskipTests            

  publish_quay:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Login to Quay
        uses: docker/login-action@v2
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Container metadata
        id: meta_quay
        uses: docker/metadata-action@v4
        with:
          images: abstractj/keycloak-operator
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}          

      - name: Build the operator Docker image
        working-directory: operator
        run: |
          echo "${{ steps.meta_quay.outputs.tags }}" | xargs -I {} \
          mvn clean package \
              -DskipTests \
              -Dquarkus.container-image.image={} \
              -Dquarkus.container-image.build=true \
              -Dquarkus.container-image.push=true \
              -Dquarkus.container-image.registry=quay.io
              -Dquarkus.container-image.group=abstractj
  publish_docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Container metadata
        id: meta_docker
        uses: docker/metadata-action@v4
        with:
          images: abstractj/keycloak-operator
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build the operator Docker image
        working-directory: operator
        run: |
          echo "${{ steps.meta_docker.outputs.tags }}" | xargs -I {} \
          mvn clean package \
              -DskipTests \
              -Dquarkus.container-image.image={} \
              -Dquarkus.container-image.build=true \
              -Dquarkus.container-image.push=true \
              -Dquarkus.container-image.group=abstractj
      